<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <script src="../templates/layout_padrao/aplicar_fontes.js"></script>

    <link rel="stylesheet" href="/contato/layoutContato.css">

<body>

<header id="header" class="header">
</header>

<main class="contato">
    <div class="topo_contato">
        <span class="subtitulo">FALE CONOSCO</span>
        <h1 class="titulo">CONTATO</h1>
    </div>

    <div class="conteudo_contato">
        <section class="formulario">

            <form id="formulario_contato">
                <div class="nome_email">

                    <div class="campo">
                        <label for="nome">NOME</label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>

                    <div class="campo">
                        <label for="email">E-MAIL</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="assunto">ASSUNTO</label>
                    <input type="text" id="assunto" placeholder="Como podemos ajudar?" required>
                </div>

                <div class="campo">
                    <label for="mensagem">MENSAGEM</label>
                    <textarea id="mensagem" placeholder="Descreva sua dúvida ou sugestão..." rows="6" required></textarea>
                </div>

                <button type="submit" class="botao_enviar">ENVIAR MENSAGEM</button>

            </form>
        </section>
