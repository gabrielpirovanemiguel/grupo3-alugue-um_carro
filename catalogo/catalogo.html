<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <script src="/templates/layout_padrao/aplicar_fontes.js"></script>

    <link rel="stylesheet" href="./catalogo.css ">
</head>

<body>
    <header id="header" class="header">
    </header>
    <main>

                <button class="botao_filtro ativo">Todos</button>
                <button class="botao_filtro">Disponível</button>
                <button class="botao_filtro">Indisponível</button>
                <button class="botao_filtro">Filme</button>
                <button class="botao_filtro">Série</button>
                <button class="botao_filtro">Desenho</button>

    </main>
    <footer id="footer" class="footer"></footer>
    <script type="module" src="/templates/layout_padrao/aplicar_layout_padrao.js"></script>

</html>
