<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <script src="/templates/layout_padrao/aplicar_fontes.js"></script>
    <script src="/templates/layout_padrao/aplicar_css_padrao.js"></script>
    <link rel="stylesheet" href="./catalago_CSS/sessao_superior.css">
    <link rel="stylesheet" href="./catalago_CSS/card.css">
    <link rel="stylesheet" href="./catalago_CSS/sessao_paginas.css">
</head>

<body>
    <header id="header" class="header">
    </header>
    <main>
        <section class="sessao_superior">
            <div class="titulo">
                <p>CATÁLOGO</p>
                <h1>TODOS OS VEÍCULOS</h1>
                <p></p>
            </div>
            <div class="filtro">
                <form action="" class="pesquisa_filtro">
                    <input type="text" name="" id="nome_filtro" placeholder="Buscar por nome ou obra...">
                </form>
                <button class="botao_filtro" value="">Todos</button>
                <button class="botao_filtro" value="disponivel">Disponível</button>
                <button class="botao_filtro" value="indisponivel">Indisponível</button>
                <button class="botao_filtro categoria" value="filme">Filme</button>
                <button class="botao_filtro categoria" value="série">Série</button>
                <button class="botao_filtro categoria" value="desenho">Desenho</button>
            </div>
        </section>
        <section class="sessao_cards">
        </section>
        <section class="paginas">
            <a class="botao_voltar seta"><</a>
            <div class="botao_paginas">

            </div>
            <a class="botao_avancar seta">></a>
        </section>

    </main>
    <footer id="footer" class="footer"></footer>
    <script type="module" src="/templates/layout_padrao/aplicar_layout_padrao.js"></script>
    <script type="module" src="./catalogo.js"></script>
</body>

</html>
